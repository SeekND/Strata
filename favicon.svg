<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0d1117"/>
  <!-- Border accent -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#e8751a" stroke-width="1.5" opacity="0.6"/>
  <!-- Mining laser beam (angular, converging lines) -->
  <path d="M8 6 L16 18 L24 6" fill="none" stroke="#e8751a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Rock/asteroid being cracked -->
  <path d="M10 22 L13 19 L16 22 L19 19 L22 22 L20 26 L12 26 Z" fill="#222a38" stroke="#4dc9f6" stroke-width="1" stroke-linejoin="round"/>
  <!-- Crack line -->
  <line x1="16" y1="18" x2="16" y2="23" stroke="#3dd68c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Energy glow dots -->
  <circle cx="16" cy="18" r="2" fill="#e8751a" opacity="0.9"/>
  <circle cx="16" cy="18" r="3.5" fill="#e8751a" opacity="0.2"/>
</svg>
